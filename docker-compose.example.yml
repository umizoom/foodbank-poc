# Example Docker Compose for use with an external reverse proxy.
# No host ports are bound — the reverse proxy should attach to the
# "foodbank" network and route traffic to:
#   frontend:80  (UI)
#   backend:8000 (API)

services:
  backend:
    image: ghcr.io/umizoom/foodbank-poc-backend:latest
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - sqlite-data:/app/data
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data --admin-password ${ADMIN_PASSWORD:-admin123} &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - foodbank

  frontend:
    image: ghcr.io/umizoom/foodbank-poc-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - foodbank

volumes:
  sqlite-data:

networks:
  foodbank:
    name: foodbank
